<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Geohash 업데이트</title>
<style>
  body { font-family: sans-serif; padding: 30px; background: #f0f4f8; }
  .box { background: white; padding: 28px; border-radius: 16px; max-width: 520px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h2 { color: #00c896; }
  .progress { height: 24px; background: #eee; border-radius: 12px; margin: 16px 0; overflow: hidden; }
  .bar { height: 100%; background: linear-gradient(90deg, #00c896, #009e76); width: 0%; transition: width 0.3s; border-radius: 12px; }
  .status { font-size: 14px; color: #555; margin: 8px 0; }
  button { background: #00c896; color: white; border: none; padding: 14px 28px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 12px; }
  button:disabled { background: #ccc; }
  .warn { color: #e74c3c; font-size: 13px; background: #fff5f5; padding: 10px 14px; border-radius: 8px; margin: 12px 0; }
</style>
</head>
<body>
<div class="box">
  <h2>📍 Geohash 필드 추가</h2>
  <p>Firebase public_toilets 컬렉션에 geohash 필드를 추가해서 근거리 검색을 가능하게 합니다.</p>
  <div class="warn">⚠️ 데이터가 많으면 시간이 걸릴 수 있어요. 완료될 때까지 창을 닫지 마세요.</div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">시작 버튼을 누르세요</div>
  <button id="btn" onclick="startUpdate()">🚀 Geohash 업데이트 시작</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, writeBatch, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD-wCqbaDy-MgDn2tK8zIxJR6kYcPehYcw",
  authDomain: "toilet-finder-d4233.firebaseapp.com",
  projectId: "toilet-finder-d4233",
  storageBucket: "toilet-finder-d4233.firebasestorage.app",
  messagingSenderId: "630778274308",
  appId: "1:630778274308:web:3fe98d6393628c8a450b51"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Geohash 인코딩
const BASE32 = '0123456789bcdefghjkmnpqrstuvwxyz';
function encodeGeohash(lat, lng, precision = 6) {
  let minLat=-90,maxLat=90,minLng=-180,maxLng=180;
  let hash='',bits=0,evenBit=true,bitCount=0;
  while(hash.length<precision){
    if(evenBit){const mid=(minLng+maxLng)/2;if(lng>=mid){bits=(bits<<1)|1;minLng=mid;}else{bits=bits<<1;maxLng=mid;}}
    else{const mid=(minLat+maxLat)/2;if(lat>=mid){bits=(bits<<1)|1;minLat=mid;}else{bits=bits<<1;maxLat=mid;}}
    evenBit=!evenBit;
    if(++bitCount===5){hash+=BASE32[bits];bits=0;bitCount=0;}
  }
  return hash;
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

window.startUpdate = async function() {
  const btn = document.getElementById('btn');
  const bar = document.getElementById('bar');
  const status = document.getElementById('status');
  btn.disabled = true;

  try {
    status.textContent = '📥 Firebase에서 데이터 불러오는 중...';
    const snap = await getDocs(collection(db, 'public_toilets'));
    const docs = [];
    snap.forEach(d => {
      const data = d.data();
      if (data.lat && data.lng && !data.geohash) {
        docs.push({ id: d.id, lat: data.lat, lng: data.lng });
      }
    });

    const total = docs.length;
    status.textContent = `총 ${total.toLocaleString()}개 문서에 geohash 추가 시작...`;

    if (total === 0) {
      status.textContent = '✅ 이미 모든 데이터에 geohash가 있거나 데이터가 없어요!';
      return;
    }

    const BATCH_SIZE = 500;
    let updated = 0;

    for (let i = 0; i < docs.length; i += BATCH_SIZE) {
      const batch = writeBatch(db);
      const chunk = docs.slice(i, i + BATCH_SIZE);
      chunk.forEach(d => {
        const ref = doc(db, 'public_toilets', d.id);
        batch.update(ref, { geohash: encodeGeohash(d.lat, d.lng, 6) });
      });
      await batch.commit();
      updated += chunk.length;
      const pct = Math.round(updated / total * 100);
      bar.style.width = pct + '%';
      status.textContent = `${updated.toLocaleString()} / ${total.toLocaleString()}개 완료 (${pct}%)`;
      await sleep(300);
    }

    status.textContent = '✅ Geohash 업데이트 완료! 이제 근거리 검색이 가능해요.';
    status.style.color = '#00c896';
    status.style.fontWeight = '700';
  } catch(e) {
    status.textContent = '❌ 오류: ' + e.message;
    status.style.color = 'red';
    btn.disabled = false;
  }
};
</script>
</body>
</html>
