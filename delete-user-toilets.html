<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사용자 데이터 삭제</title>
<style>
  body { font-family: sans-serif; padding: 30px; background: #f0f4f8; }
  .box { background: white; padding: 28px; border-radius: 16px; max-width: 520px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h2 { color: #e74c3c; margin-bottom: 8px; }
  .progress { height: 24px; background: #eee; border-radius: 12px; margin: 16px 0; overflow: hidden; }
  .bar { height: 100%; background: linear-gradient(90deg, #e74c3c, #c0392b); width: 0%; transition: width 0.3s; border-radius: 12px; }
  .status { font-size: 14px; color: #555; margin: 8px 0; min-height: 20px; }
  button { background: #e74c3c; color: white; border: none; padding: 14px 28px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 12px; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .warn { color: #e74c3c; font-size: 13px; background: #fff5f5; padding: 10px 14px; border-radius: 8px; margin: 12px 0; }
  .item-list { margin: 12px 0; max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 8px; }
  .item { font-size: 13px; padding: 4px 0; border-bottom: 1px solid #f0f0f0; color: #555; }
</style>
</head>
<body>
<div class="box">
  <h2>🗑 사용자 등록 화장실 삭제</h2>
  <p>Firebase 'toilets' 컬렉션의 사용자가 직접 등록한 데이터를 모두 삭제합니다.</p>
  <div class="warn">⚠️ 삭제된 데이터는 복구할 수 없습니다!</div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">버튼을 눌러 삭제할 데이터를 확인하세요</div>
  <div class="item-list" id="item-list" style="display:none;"></div>
  <button id="btn-check" onclick="checkData()">🔍 데이터 확인</button>
  <button id="btn-delete" onclick="deleteData()" style="display:none;">🗑 전체 삭제</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD-wCqbaDy-MgDn2tK8zIxJR6kYcPehYcw",
  authDomain: "toilet-finder-d4233.firebaseapp.com",
  projectId: "toilet-finder-d4233",
  storageBucket: "toilet-finder-d4233.firebasestorage.app",
  messagingSenderId: "630778274308",
  appId: "1:630778274308:web:3fe98d6393628c8a450b51"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let docsToDelete = [];

window.checkData = async function() {
  const btn = document.getElementById('btn-check');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '📥 데이터 확인 중...';

  try {
    const snap = await getDocs(collection(db, 'toilets'));
    docsToDelete = [];
    snap.forEach(d => docsToDelete.push({ id: d.id, ...d.data() }));

    const itemList = document.getElementById('item-list');
    if (docsToDelete.length === 0) {
      status.textContent = '✅ 삭제할 데이터가 없어요!';
      btn.disabled = false;
      return;
    }

    itemList.style.display = 'block';
    itemList.innerHTML = docsToDelete.map(t =>
      `<div class="item">🚻 ${t.name || '이름없음'} (${t.addedBy || '사용자'})</div>`
    ).join('');

    status.textContent = `총 ${docsToDelete.length}개 발견됨. 삭제하시겠어요?`;
    document.getElementById('btn-delete').style.display = 'block';
    btn.style.display = 'none';
  } catch(e) {
    status.textContent = '❌ 오류: ' + e.message;
    btn.disabled = false;
  }
};

window.deleteData = async function() {
  const btn = document.getElementById('btn-delete');
  const bar = document.getElementById('bar');
  const status = document.getElementById('status');
  btn.disabled = true;

  const total = docsToDelete.length;
  let deleted = 0;

  for (const t of docsToDelete) {
    try {
      await deleteDoc(doc(db, 'toilets', t.id));
      deleted++;
      const pct = Math.round(deleted / total * 100);
      bar.style.width = pct + '%';
      status.textContent = `${deleted} / ${total}개 삭제 완료 (${pct}%)`;
    } catch(e) {
      console.error('삭제 오류:', e);
    }
  }

  status.textContent = '✅ 모든 사용자 등록 데이터가 삭제됐습니다!';
  status.style.color = '#00c896';
  status.style.fontWeight = '700';
  document.getElementById('item-list').style.display = 'none';
};
</script>
</body>
</html>
