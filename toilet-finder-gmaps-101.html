<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>🚻 화장실 찾기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --teal: #00c896;
    --teal-dark: #009e76;
    --orange: #ff7043;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #8892a4;
    --border: #e8ecf2;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--card);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    z-index: 100;
    position: relative;
  }
  .header-logo { font-size: 26px; }
  .header-title { flex: 1; }
  .header-title h1 { font-size: 17px; font-weight: 900; color: var(--teal-dark); letter-spacing: -0.5px; }
  .header-title p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .btn-add {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 22px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    box-shadow: 0 3px 10px rgba(0,200,150,0.35);
    transition: all 0.2s;
  }
  .btn-add:active { transform: scale(0.95); }

  /* FILTER BAR */
  .filter-bar {
    background: var(--card);
    padding: 8px 14px;
    display: flex;
    gap: 7px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .filter-chip.active {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }

  /* MAP */
  #map {
    flex: 1;
    position: relative;
  }
  #map-canvas {
    width: 100%;
    height: 100%;
  }

  /* FAB current location */
  .fab-location {
    position: relative;
    width: 44px;
    height: 44px;
    background: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: transform 0.2s;
  }
  .fab-location:active { transform: scale(0.9); }

  /* BOTTOM SHEET */
  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.15);
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .bottom-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-content { padding: 16px 20px calc(40px + env(safe-area-inset-bottom, 0px)); }
  .sheet-title {
    font-size: 17px;
    font-weight: 900;
    margin-bottom: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* DETAIL SHEET */
  .detail-name { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
  }
  .tag-type { background: rgba(0,200,150,0.12); color: var(--teal-dark); }
  .tag-accessible { background: rgba(0,150,255,0.12); color: #0096ff; }
  .tag-api { background: rgba(255,140,0,0.12); color: #e67e00; font-weight: 800; }
  .user-rating-row { display: flex; gap: 6px; margin: 10px 0 6px; align-items: center; }
  .user-star-btn {
    font-size: 26px; background: none; border: none; cursor: pointer;
    padding: 2px; transition: transform 0.15s; line-height: 1;
    filter: grayscale(1) opacity(0.4);
  }
  .user-star-btn.on { filter: none; transform: scale(1.1); }
  .rating-count { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .rating-avg { font-size: 14px; font-weight: 800; color: #ffc107; }
  .stars { color: #ffc107; font-size: 18px; margin-bottom: 8px; }
  .detail-notes {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: #555;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .detail-meta { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .btn-nav {
    width: 100%;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .btn-delete {
    width: 100%;
    background: none;
    color: #ff4444;
    border: 1.5px solid #ffcccc;
    border-radius: 12px;
    padding: 12px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  /* ADD FORM */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--teal); }
  .form-select {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    appearance: none;
  }
  .rating-row { display: flex; gap: 8px; }
  .star-btn {
    width: 40px; height: 40px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .star-btn.on { background: #fff8e1; border-color: #ffc107; }
  .check-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    background: var(--bg);
    border-radius: 10px;
    cursor: pointer;
  }
  .check-row input { width: 18px; height: 18px; accent-color: var(--teal); }
  .location-indicator {
    background: rgba(0,200,150,0.08);
    border: 1.5px solid rgba(0,200,150,0.3);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--teal-dark);
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .location-indicator.empty {
    background: rgba(255,100,0,0.06);
    border-color: rgba(255,100,0,0.25);
    color: var(--orange);
  }
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,200,150,0.35);
    margin-top: 6px;
  }
  .btn-cancel {
    width: 100%;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--muted);
    cursor: pointer;
    margin-top: 8px;
  }
  .error-msg { color: var(--orange); font-size: 12px; margin-top: 6px; font-weight: 600; }

  /* OVERLAY */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(30px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 12px 22px;
    border-radius: 22px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* COUNT BADGE */
  .count-badge {
    background: var(--teal);
    color: white;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 4px;
  }

  /* Add mode banner */
  .add-banner {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,112,67,0.95);
    color: white;
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    z-index: 10;
    display: none;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(255,112,67,0.4);
  }
  .add-banner.show { display: block; }

  /* NAV */
  nav {
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 6px 0 calc(14px + env(safe-area-inset-bottom, 0px));
    z-index: 100;
    position: relative;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
  }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn .nav-label { font-size: 10px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); }
  .nav-btn.active .nav-label { color: var(--teal); }
  .nav-btn.active .nav-icon { filter: saturate(2); }

  /* LIST VIEW */
  .list-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
    -webkit-overflow-scrolling: touch;
  }
  .list-view.show { display: flex; }
  .list-search {
    padding: 12px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .list-search input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 36px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
  }
  .list-search { position: relative; }
  .search-icon {
    position: absolute;
    top: 50%;
    left: 28px;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }
  .list-items { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .list-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: transform 0.15s;
    border: 1px solid var(--border);
  }
  .list-card:active { transform: scale(0.98); }
  .list-card-name { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
  .list-card-row { display: flex; justify-content: space-between; align-items: center; }
  .list-card-stars { color: #ffc107; font-size: 13px; }
  .list-card-time { font-size: 11px; color: var(--muted); }
  .list-card-notes { font-size: 12px; color: #888; margin-top: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
  .lang-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }
  .lang-selector {
    display: flex;
    gap: 5px;
    align-items: center;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span class="header-logo">🚻</span>
  <div class="header-title">
    <h1 id="app-title">화장실 찾기</h1>
    <p id="count-label">데이터 로딩 중...</p>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
    <div class="lang-selector">
      <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
    </div>
    <button class="btn-add" id="btn-add" onclick="openAddSheet()">
      <span>+</span> <span id="btn-add-text">등록</span>
    </button>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar">
  <button class="filter-chip active" id="fc-all" onclick="setFilter('전체', this)">전체</button>
  <button class="filter-chip" id="fc-public" onclick="setFilter('공공', this)">공공</button>
  <button class="filter-chip" id="fc-commercial" onclick="setFilter('상업시설', this)">상업시설</button>
  <button class="filter-chip" id="fc-park" onclick="setFilter('공원', this)">공원</button>
  <button class="filter-chip" id="fc-subway" onclick="setFilter('지하철', this)">지하철</button>
  <button class="filter-chip" id="fc-mall" onclick="setFilter('쇼핑몰', this)">쇼핑몰</button>
  <button class="filter-chip" id="fc-etc" onclick="setFilter('기타', this)">기타</button>
</div>

<!-- MAP VIEW -->
<div id="map" style="flex:1; position:relative; display:flex; flex-direction:column;">
  <div id="map-canvas" style="flex:1;"></div>
  <div class="add-banner" id="add-banner">📍 지도를 탭해서 위치를 선택하세요</div>
  <div style="position:absolute;bottom:160px;right:16px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:3px;">
  <button class="fab-location" style="position:static;bottom:auto;right:auto;" onclick="goToMyLocation()" title="내 위치">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="8" fill="#d0e8ff" opacity="0.8"/>
      <circle cx="12" cy="12" r="5" fill="white" stroke="white" stroke-width="1"/>
      <circle cx="12" cy="12" r="3.5" fill="#1a73e8"/>
    </svg>
  </button>
  <span id="my-location-label" style="font-size:10px;font-weight:700;color:#444;background:white;padding:2px 6px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.2);white-space:nowrap;">내 위치</span>
</div>
</div>

<!-- LIST VIEW -->
<div class="list-view" id="list-view">
  <div class="list-search">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="화장실 이름 검색..." oninput="renderList(this.value)" id="search-input" data-placeholder-ko="화장실 이름 검색..." data-placeholder-en="Search toilet name..." data-placeholder-zh="搜索厕所名称...">
  </div>
  <div class="list-items" id="list-items"></div>
</div>

<!-- NAV -->
<nav>
  <button class="nav-btn active" id="nav-map" onclick="switchView('map')">
    <span class="nav-icon">🗺️</span>
    <span class="nav-label" id="nav-label-map">지도</span>
  </button>
  <button class="nav-btn" id="nav-list" onclick="switchView('list')">
    <span class="nav-icon">📋</span>
    <span class="nav-label" id="nav-label-list">목록</span>
  </button>
</nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<!-- DETAIL SHEET -->
<div class="bottom-sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content">
    <div class="detail-name" id="d-name"></div>
    <div class="detail-tags" id="d-tags"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <div class="stars" id="d-stars"></div>
      <span class="rating-count" id="d-rating-count"></span>
    </div>
    <!-- 사용자 별점 주기 -->
    <div style="background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;" id="rate-label">청결도 평가하기</div>
      <div class="user-rating-row" id="user-rating-row">
        <button class="user-star-btn" onclick="submitUserRating(1)">⭐</button>
        <button class="user-star-btn" onclick="submitUserRating(2)">⭐</button>
        <button class="user-star-btn" onclick="submitUserRating(3)">⭐</button>
        <button class="user-star-btn" onclick="submitUserRating(4)">⭐</button>
        <button class="user-star-btn" onclick="submitUserRating(5)">⭐</button>
      </div>
      <div id="user-rated-msg" style="font-size:12px;color:var(--teal);font-weight:700;display:none;">✅ 평가해주셔서 감사합니다!</div>
    </div>
    <div class="detail-notes" id="d-notes"></div>
    <div class="detail-meta" id="d-meta"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;"><button class="btn-nav" style="flex:1;margin-bottom:0;background:#FEE500;color:#3C1E1E;font-weight:900;" onclick="openKakaoNav()"><span id="btn-kakao-text">🗺️ 카카오맵</span></button><button class="btn-nav" style="flex:1;margin-bottom:0;" onclick="openGoogleMapsNav()"><span id="btn-google-text">🌐 구글맵</span></button></div>
    <button class="btn-delete" id="d-delete-btn" onclick="deleteSelected()" style="display:none;"><span id="btn-delete-text">삭제</span></button>
  </div>
</div>

<!-- ADD SHEET -->
<div class="bottom-sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content">
    <div class="sheet-title" id="form-title">🚻 새 화장실 등록</div>

    <div id="loc-indicator" class="location-indicator empty">
      <span id="loc-hint-text">📍 지도에서 위치를 먼저 탭하세요</span>
    </div>

    <div class="form-group">
      <label class="form-label">이름 *</label>
      <input class="form-input" id="f-name" type="text" placeholder="예: 홍대입구역 공중화장실">
    </div>

    <div class="form-group">
      <label class="form-label">종류</label>
      <select class="form-select" id="f-type">
        <option>공공</option>
        <option>상업시설</option>
        <option>공원</option>
        <option>지하철</option>
        <option>쇼핑몰</option>
        <option>기타</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">청결도</label>
      <div class="rating-row" id="rating-row">
        <button class="star-btn on" onclick="setRating(1)">⭐</button>
        <button class="star-btn on" onclick="setRating(2)">⭐</button>
        <button class="star-btn on" onclick="setRating(3)">⭐</button>
        <button class="star-btn on" onclick="setRating(4)">⭐</button>
        <button class="star-btn" onclick="setRating(5)">⭐</button>
      </div>
    </div>

    <div class="form-group">
      <label class="check-row">
        <input type="checkbox" id="f-accessible">
        <span style="font-size:14px; font-weight:600;">♿ 장애인 접근 가능</span>
      </label>
    </div>

const CHOSUNG = ['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
const JUNGSUNG = ['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
const JONGSUNG = ['','g','kk','gs','n','nj','nh','d','l','lg','lm','lb','ls','lt','lp','lh','m','b','bs','s','ss','ng','j','ch','k','t','p','h'];

function koreanToRoman(str) {
  let result = '';
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i) - 0xAC00;
    if (code < 0 || code > 11171) {
      // 한글 아닌 문자는 그대로
      result += str[i];
      continue;
    }
    const cho = Math.floor(code / 21 / 28);
    const jung = Math.floor((code % (21 * 28)) / 28);
    const jong = code % 28;
    result += CHOSUNG[cho] + JUNGSUNG[jung] + JONGSUNG[jong];
  }
  return result.charAt(0).toUpperCase() + result.slice(1);
}

function koreanToPinyin(str) {
  // 발음 기반 병음 변환 (로마자 기반으로 근사)
  const roman = koreanToRoman(str);
  // 주요 발음 패턴 중국어 독자용 표기
  return roman
    .replace(/eo/g, 'ŏ')
    .replace(/eu/g, 'ŭ')
    .replace(/ae/g, 'e')
    .replace(/oe/g, 'ö')
    .replace(/ui/g, 'ŭi');
}

function translateName(name, lang) {
  if (lang === 'ko') return { main: name, sub: null };

  const idx = lang === 'en' ? 1 : 2;

  // 1단계: 알려진 패턴 번역
  let result = name;
  NAME_PATTERNS.forEach(([ko, en, zh]) => {
    try {
      result = result.replace(new RegExp(ko, 'g'), lang === 'en' ? en : zh);
    } catch(e) {}
  });

  // 2단계: 번역 후에도 남아있는 한글을 로마자로 변환
  // 한글 문자 범위: AC00~D7A3
  const hasKorean = (str) => /[\uAC00-\uD7A3]/.test(str);

  if (hasKorean(result)) {
    // 한글이 남아있으면 한글 부분만 로마자 변환
    result = result.replace(/[\uAC00-\uD7A3]+/g, (match) => {
      return lang === 'en' ? koreanToRoman(match) : koreanToPinyin(match);
    });
  }

  return { main: result, sub: name };
}

function getDisplayName(toilet) {
  if (currentLang === 'ko') return toilet.name;
  const { main, sub } = translateName(toilet.name, currentLang);
  if (sub) {
    return main + ' <small style="color:#aaa;font-weight:400;font-size:11px;">(' + sub + ')</small>';
  }
  return main;
}

async function loadData() {
  try {
    document.getElementById('count-label').textContent = '데이터 로딩 중...';
    const { collection, getDocs } = window._fbFns;
    const db = window._db;

    // 사용자 등록 화장실만 전체 로드 (적은 양)
    const userSnap = await getDocs(collection(db, 'toilets'));
    userToilets = [];
    userSnap.forEach(d => userToilets.push({ ...d.data(), _docId: d.id }));

    toilets = [...ALL_SAMPLES, ...userToilets];
    updateCountLabel();
    renderMarkers();

    const center = map.getCenter();
    await loadNearbyPublicToilets(center.lat(), center.lng());

  } catch(e) {

    toilets = ALL_SAMPLES;
    showToast(t('locPermission'));
    updateCountLabel();
    renderMarkers();
  }
}

// 공공 화장실 Firebase 전체 로드 (geohash 준비 전 사용)
let publicDataLoaded = false;
async function loadNearbyPublicToilets(lat, lng) {
  // 이미 로드됐으면 스킵
  if (publicDataLoaded) return;
  await loadAllPublicToilets();
}

async function loadAllPublicToilets() {
  if (publicDataLoaded) return;
  try {
    const { collection, getDocs } = window._fbFns;
    const db = window._db;
    document.getElementById('count-label').textContent = '공공 화장실 로딩 중...';
    const snap = await getDocs(collection(db, 'public_toilets'));
    publicToilets = [];
    snap.forEach(d => publicToilets.push(d.data()));
    publicDataLoaded = true;
    toilets = [...ALL_SAMPLES, ...publicToilets, ...userToilets];
    showToast('✅ ' + toilets.length.toLocaleString() + '개 로드 완료!');
    updateCountLabel();
    renderMarkers();
  } catch(e) {
    console.error('공공 화장실 로드 오류:', e);
  }
}

// 경기도 공중화장실 API 호출 (CORS 우회: 프록시 사용)
async function loadGyeonggiData() {
  try {
    const pageSize = 1000;
    const apiUrl = `https://openapi.gg.go.kr/PublicToiletHc?KEY=${GG_API_KEY}&Type=json&pIndex=1&pSize=${pageSize}`;
    
    // 여러 CORS 프록시 순서대로 시도
    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`,
      `https://proxy.cors.sh/${apiUrl}`,
      `https://thingproxy.freeboard.io/fetch/${apiUrl}`,
    ];
    
    let data = null;
    for (const proxyUrl of proxies) {
      try {
        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) continue;
        data = await res.json();
        if (data?.PublicToiletHc) break;
      } catch(e) {
        continue;
      }
    }
    
    if (!data?.PublicToiletHc) {
      console.warn('경기도 API: 모든 프록시 실패');
      return [];
    }
    
    const rows = data.PublicToiletHc[1]?.row || [];
    const results = [];
    
    rows.forEach((r, i) => {
      const lat = parseFloat(r.REFINE_WGS84_LAT);
      const lng = parseFloat(r.REFINE_WGS84_LOGT);
      if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;
      if (!(33 < lat && lat < 39 && 124 < lng && lng < 132)) return;
      
      results.push({
        id: `gg_${i}_${Date.now()}`,
        name: r.PBCTLT_PLC_NM || '경기도 공중화장실',
        lat, lng,
        type: '공공',
        rating: 4,
        accessible: (parseInt(r.MALE_HANDICAPPED_TOILET_CNT) > 0 || parseInt(r.FEMALE_HANDICAPPED_TOILET_CNT) > 0),
        notes: `${r.SIGUN_NM || ''} | ${r.REFINE_ROADNM_ADDR || r.REFINE_LOTNO_ADDR || ''}`.trim(),
        addedBy: '경기도공공데이터',
        ts: 1700000000000
      });
    });
    
    console.log(`경기도 API: ${results.length}개 로드 완료`);
    return results;
  } catch(e) {
    console.warn('경기도 API 오류:', e);
    return [];
  }
}

  try {

    return null;

}

}

// ─── MAP INIT ────────────────────────────────────────
function initMap() {
  map = new google.maps.Map(document.getElementById('map-canvas'), {
    center: { lat: 37.5665, lng: 126.9780 },
    zoom: 14,
    disableDefaultUI: true,
    zoomControl: true,
    gestureHandling: 'greedy',
    styles: [
      { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
      { featureType: "transit.station", elementType: "labels.icon", stylers: [{ visibility: "simplified" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9e8f5" }] },
      { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#f5f7f2" }] },
      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
      { featureType: "road.arterial", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
      { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#888888" }] },
    ]
  });

  map.addListener('click', function(e) {
    if (addMode) {
      setPendingLocation(e.latLng.lat(), e.latLng.lng());
    } else {
      closeAllSheets();
    }
  });

  // 지도 이동/줌 완료 후 마커 갱신 + 근처 데이터 재조회
  map.addListener('idle', function() {
    renderMarkers();
    // 공공 데이터 아직 안 로드됐으면 로드
    if (window._db && !publicDataLoaded) {
      const center = map.getCenter();
      loadNearbyPublicToilets(center.lat(), center.lng());
    }
  });

  if (window._db) {
    loadData();
  } else {
    window.addEventListener('firebase-ready', () => {
      loadData();
    });
  }
}

// ─── MARKERS ─────────────────────────────────────────
let renderTimer = null;
function renderMarkers() {
  // 디바운스: 연속 호출 방지
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(_doRenderMarkers, 200);
}

function _doRenderMarkers() {
  // 현재 뷰포트 범위 계산
  const bounds = map.getBounds();
  if (!bounds) return;

  const filtered = toilets.filter(t => activeFilter === '전체' || t.type === activeFilter);

  // 뷰포트 밖 마커 제거, 안에 있는 것만 추가 (최대 200개)
  const inView = filtered.filter(t => bounds.contains({ lat: t.lat, lng: t.lng }));
  const toShow = inView.slice(0, 200);
  const toShowIds = new Set(toShow.map(t => t.id));

  // 뷰포트 밖 마커 제거
  Object.keys(markers).forEach(id => {
    if (!toShowIds.has(id)) {
      markers[id].setMap(null);
      delete markers[id];
    }
  });

  // 새 마커 추가
  toShow.forEach(t => {
    if (markers[t.id]) return; // 이미 있으면 스킵
    const color = t.accessible ? '#00c896' : '#ff7043';
    const marker = new google.maps.Marker({
      position: { lat: t.lat, lng: t.lng },
      map,
      title: t.name,
      icon: {
        path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z',
        fillColor: color,
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        scale: 1.6,
        anchor: new google.maps.Point(12, 22),
        labelOrigin: new google.maps.Point(12, 9),
      },
      label: { text: '🚻', fontSize: '11px' },
    });
    marker.addListener('click', () => openDetail(t.id));
    markers[t.id] = marker;
  });

  updateCountLabel();
}

function openDetail(id) {

  const ratedMsg = document.getElementById('user-rated-msg');

    stars.forEach((s, i) => s.classList.toggle('on', i < prev));

// ─── 사용자 별점 ──────────────────────────────────────
async function submitUserRating(score) {
  const toilet = toilets.find(x => x.id === selectedId);
  if (!toilet) return;

  const ratedKey = 'rated_' + toilet.id;
  if (localStorage.getItem(ratedKey)) {
    showToast('이미 평가하셨습니다!');
    return;
  }

  // 별 하이라이트
  const stars = document.querySelectorAll('.user-star-btn');
  stars.forEach((s, i) => s.classList.toggle('on', i < score));

  // Firebase에 별점 저장
  try {
    const { collection, addDoc, doc, updateDoc, getDoc, increment } = window._fbFns;
    const db = window._db;

    // ratings 컬렉션에 저장
    await addDoc(collection(db, 'ratings'), {
      toiletId: toilet.id,
      score,
      ts: Date.now()
    });

    // toilet 문서 평균 업데이트 (public_toilets 또는 toilets)
    const colName = toilet._docId && !toilet.id.startsWith('s') && !toilet.id.startsWith('pub_') && !toilet.id.startsWith('subway_') ? 'toilets' : 'public_toilets';
    if (toilet._docId) {
      try {
        await updateDoc(doc(db, colName, toilet._docId), {
          ratingSum: (toilet.ratingSum || toilet.rating || 4) + score,
          ratingCount: (toilet.ratingCount || 0) + 1
        });
      } catch(e) {}
    }

    // 로컬 상태 업데이트
    toilet.ratingSum = (toilet.ratingSum || toilet.rating || 4) + score;
    toilet.ratingCount = (toilet.ratingCount || 0) + 1;
    const newAvg = toilet.ratingSum / toilet.ratingCount;
    document.getElementById('d-stars').textContent = '★'.repeat(Math.round(newAvg)) + '☆'.repeat(5 - Math.round(newAvg));
    document.getElementById('d-rating-count').textContent = `${newAvg.toFixed(1)} (${toilet.ratingCount}명)`;

    // 이미 평가했다고 저장
    localStorage.setItem(ratedKey, score.toString());
    document.getElementById('user-rated-msg').style.display = 'block';
    document.getElementById('user-rating-row').style.opacity = '0.5';
    showToast('⭐ 별점을 남겨주셔서 감사합니다!');

  } catch(e) {
    console.error('별점 저장 오류:', e);
    showToast('별점 저장에 실패했습니다');
  }
}

// ─── LIST ────────────────────────────────────────────
function renderList(search = '') {
  let filtered = toilets
    .filter(t => activeFilter === '전체' || t.type === activeFilter)
    .filter(t => !search || t.name.includes(search) || (t.notes && t.notes.includes(search)));

  // 지도 뷰포트 범위 안의 화장실만 표시 (검색어 없을 때)
  const bounds = map && map.getBounds();
  let isViewportFiltered = false;
  if (bounds && !search) {
    const inView = filtered.filter(t => bounds.contains({ lat: t.lat, lng: t.lng }));
    if (inView.length > 0) {
      filtered = inView;
      isViewportFiltered = true;
    }
  }

  // 내 위치 있으면 거리 계산 후 가까운 순 정렬
  if (userLocation) {
    filtered = filtered.map(t => ({
      ...t,
      distance: calcDistance(userLocation.lat, userLocation.lng, t.lat, t.lng)
    })).sort((a, b) => a.distance - b.distance);
  }

  const container = document.getElementById('list-items');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🚻</div><p>${t("emptyState")}</p></div>`;
    return;
  }

  const viewportBadge = isViewportFiltered
    ? `<div style="text-align:center;padding:8px;font-size:12px;color:#00c896;background:#f0fdf8;border-radius:10px;margin-bottom:10px;font-weight:700;">${t("viewportBadge")} ${filtered.length}</div>`
    : '';
  const locationHint = userLocation ? '' : `<div style="text-align:center;padding:10px;font-size:12px;color:#aaa;background:#f9f9f9;border-radius:10px;margin-bottom:10px;">${t("locationHint")}</div>`;
  const headerHtml = viewportBadge + (isViewportFiltered ? '' : locationHint);

  container.innerHTML = headerHtml + filtered.map(t => `
    <div class="list-card" onclick="openDetailFromList('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="list-card-name" style="flex:1;">${getDisplayName(t)}</div>
        ${t.distance !== undefined ? `<span style="font-size:13px;font-weight:800;color:var(--teal-dark);margin-left:8px;white-space:nowrap;">${formatDistance(t.distance)}</span>` : ''}
      </div>
      <div class="detail-tags" style="margin-bottom:6px">
        <span class="tag tag-type">${t.type}</span>
        ${t.accessible ? '<span class="tag tag-accessible">♿</span>' : ''}
        ${t.addedBy === '경기도공공데이터' ? '<span class="tag tag-api">API</span>' : ''}
      </div>
      <div class="list-card-row">
        <span class="list-card-stars">${'★'.repeat(Math.round(t.ratingSum && t.ratingCount ? t.ratingSum/t.ratingCount : t.rating))}${'☆'.repeat(5-Math.round(t.ratingSum && t.ratingCount ? t.ratingSum/t.ratingCount : t.rating))}</span>${t.ratingCount > 0 ? `<span style="font-size:11px;color:var(--muted);margin-left:4px;">(${(t.ratingSum/t.ratingCount).toFixed(1)}, ${t.ratingCount}명)</span>` : ''}
        <span class="list-card-time">${timeAgo(t.ts)}</span>
      </div>
      ${t.notes ? `<div class="list-card-notes">${t.notes}</div>` : ''}
    </div>
  `).join('');
}

// ─── LOCATION ────────────────────────────────────────
function goToMyLocation() {
  if (!navigator.geolocation) {
    showToast('위치 정보를 사용할 수 없습니다');
    return;
  }

  showToast(t('locating'));

  // 권한 상태 먼저 확인
  if (navigator.permissions) {
    navigator.permissions.query({ name: 'geolocation' }).then(result => {
      if (result.state === 'denied') {
        showToast('설정에서 위치 권한을 허용해 주세요');
        // 설정 페이지로 안내
        if (confirm('위치 권한이 차단되어 있어요.\n크롬 설정 > 사이트 설정 > 위치에서 허용해 주세요.\n\n확인을 누르면 설정으로 이동합니다.')) {
          window.open('chrome://settings/content/location');
        }
        return;
      }
      _requestLocation();
    });
  } else {
    _requestLocation();
  }
}

function _requestLocation() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.panTo(userLocation);
      map.setZoom(16);

      if (window._myLocationMarker) window._myLocationMarker.setMap(null);
      window._myLocationMarker = new google.maps.Marker({
        position: userLocation,
        map: map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#4285f4',
          fillOpacity: 1,
          strokeColor: '#ffffff',
          strokeWeight: 3,
        },
        zIndex: 999,
        title: '내 위치'
      });

      renderList(document.getElementById('search-input').value);
      showToast(t('locSorted'));
    },
    err => {
      console.error('위치 오류:', err.code, err.message);
      if (err.code === 1) {
        // PERMISSION_DENIED
        showToast('위치 권한이 차단됐어요. 브라우저 설정에서 허용해 주세요.');
      } else if (err.code === 2) {
        // POSITION_UNAVAILABLE
        showToast('위치를 찾을 수 없어요. GPS를 켜주세요.');
      } else if (err.code === 3) {
        // TIMEOUT - 타임아웃 시 재시도
        showToast('위치 확인 중... 잠시 후 다시 시도합니다');
        setTimeout(() => _requestLocation(), 2000);
      }
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 60000
    }
  );
}

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(m) {
  if (m < 1000) return Math.round(m) + 'm';
  return (m / 1000).toFixed(1) + 'km';
}

function timeAgo(ts) {

  return `${Math.floor(d/86400000)}일 전`;
}

<!-- Geohash 라이브러리 -->
<script>
// Geohash 인코딩/디코딩 (경량 구현)
const BASE32 = '0123456789bcdefghjkmnpqrstuvwxyz';
function encodeGeohash(lat, lng, precision = 6) {
  let minLat = -90, maxLat = 90, minLng = -180, maxLng = 180;
  let hash = '', bits = 0, evenBit = true, bitCount = 0;
  while (hash.length < precision) {
    if (evenBit) {
      const mid = (minLng + maxLng) / 2;
      if (lng >= mid) { bits = (bits << 1) | 1; minLng = mid; }
      else { bits = bits << 1; maxLng = mid; }
    } else {
      const mid = (minLat + maxLat) / 2;
      if (lat >= mid) { bits = (bits << 1) | 1; minLat = mid; }
      else { bits = bits << 1; maxLat = mid; }
    }
    evenBit = !evenBit;
    if (++bitCount === 5) {
      hash += BASE32[bits]; bits = 0; bitCount = 0;
    }
  }
  return hash;
}
function getGeohashRange(lat, lng, radiusKm) {
  const latDelta = radiusKm / 111;
  const lngDelta = radiusKm / (111 * Math.cos(lat * Math.PI / 180));
  const minHash = encodeGeohash(lat - latDelta, lng - lngDelta, 4);
  const maxHash = encodeGeohash(lat + latDelta, lng + lngDelta, 4);
  return { minHash, maxHash };
}
window._geohash = { encode: encodeGeohash, getRange: getGeohashRange };
</script>
