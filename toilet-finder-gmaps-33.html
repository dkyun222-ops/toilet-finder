<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>🚻 화장실 찾기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --teal: #00c896;
    --teal-dark: #009e76;
    --orange: #ff7043;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #8892a4;
    --border: #e8ecf2;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--card);
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    z-index: 100;
    position: relative;
  }
  .header-logo { font-size: 26px; }
  .header-title { flex: 1; }
  .header-title h1 { font-size: 17px; font-weight: 900; color: var(--teal-dark); letter-spacing: -0.5px; }
  .header-title p { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .btn-add {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 22px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    box-shadow: 0 3px 10px rgba(0,200,150,0.35);
    transition: all 0.2s;
  }
  .btn-add:active { transform: scale(0.95); }

  /* FILTER BAR */
  .filter-bar {
    background: var(--card);
    padding: 8px 14px;
    display: flex;
    gap: 7px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .filter-chip.active {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }

  /* MAP */
  #map {
    flex: 1;
    position: relative;
  }
  #map-canvas {
    width: 100%;
    height: 100%;
  }

  /* FAB current location */
  .fab-location {
    position: relative;
    width: 44px;
    height: 44px;
    background: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: transform 0.2s;
  }
  .fab-location:active { transform: scale(0.9); }

  /* BOTTOM SHEET */
  .bottom-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.15);
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .bottom-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-content { padding: 16px 20px calc(40px + env(safe-area-inset-bottom, 0px)); }
  .sheet-title {
    font-size: 17px;
    font-weight: 900;
    margin-bottom: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* DETAIL SHEET */
  .detail-name { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
  }
  .tag-type { background: rgba(0,200,150,0.12); color: var(--teal-dark); }
  .tag-accessible { background: rgba(0,150,255,0.12); color: #0096ff; }
  .tag-api { background: rgba(255,140,0,0.12); color: #e67e00; font-weight: 800; }
  .stars { color: #ffc107; font-size: 18px; margin-bottom: 8px; }
  .detail-notes {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: #555;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .detail-meta { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .btn-nav {
    width: 100%;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .btn-delete {
    width: 100%;
    background: none;
    color: #ff4444;
    border: 1.5px solid #ffcccc;
    border-radius: 12px;
    padding: 12px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  /* ADD FORM */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--teal); }
  .form-select {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    appearance: none;
  }
  .rating-row { display: flex; gap: 8px; }
  .star-btn {
    width: 40px; height: 40px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .star-btn.on { background: #fff8e1; border-color: #ffc107; }
  .check-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    background: var(--bg);
    border-radius: 10px;
    cursor: pointer;
  }
  .check-row input { width: 18px; height: 18px; accent-color: var(--teal); }
  .location-indicator {
    background: rgba(0,200,150,0.08);
    border: 1.5px solid rgba(0,200,150,0.3);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--teal-dark);
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .location-indicator.empty {
    background: rgba(255,100,0,0.06);
    border-color: rgba(255,100,0,0.25);
    color: var(--orange);
  }
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 16px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,200,150,0.35);
    margin-top: 6px;
  }
  .btn-cancel {
    width: 100%;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--muted);
    cursor: pointer;
    margin-top: 8px;
  }
  .error-msg { color: var(--orange); font-size: 12px; margin-top: 6px; font-weight: 600; }

  /* OVERLAY */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(30px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 12px 22px;
    border-radius: 22px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* COUNT BADGE */
  .count-badge {
    background: var(--teal);
    color: white;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 10px;
    margin-left: 4px;
  }

  /* Add mode banner */
  .add-banner {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,112,67,0.95);
    color: white;
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    z-index: 10;
    display: none;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(255,112,67,0.4);
  }
  .add-banner.show { display: block; }

  /* NAV */
  nav {
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 6px 0 calc(14px + env(safe-area-inset-bottom, 0px));
    z-index: 100;
    position: relative;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
  }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn .nav-label { font-size: 10px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; color: var(--muted); }
  .nav-btn.active .nav-label { color: var(--teal); }
  .nav-btn.active .nav-icon { filter: saturate(2); }

  /* LIST VIEW */
  .list-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
  }
  .list-view.show { display: flex; }
  .list-search {
    padding: 12px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .list-search input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 36px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
  }
  .list-search { position: relative; }
  .search-icon {
    position: absolute;
    top: 50%;
    left: 28px;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }
  .list-items { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .list-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: transform 0.15s;
    border: 1px solid var(--border);
  }
  .list-card:active { transform: scale(0.98); }
  .list-card-name { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
  .list-card-row { display: flex; justify-content: space-between; align-items: center; }
  .list-card-stars { color: #ffc107; font-size: 13px; }
  .list-card-time { font-size: 11px; color: var(--muted); }
  .list-card-notes { font-size: 12px; color: #888; margin-top: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span class="header-logo">🚻</span>
  <div class="header-title">
    <h1>화장실 찾기</h1>
    <p id="count-label">데이터 로딩 중...</p>
  </div>
  <button class="btn-add" onclick="openAddSheet()">
    <span>+</span> 등록
  </button>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" id="filter-bar">
  <button class="filter-chip active" onclick="setFilter('전체', this)">전체</button>
  <button class="filter-chip" onclick="setFilter('공공', this)">공공</button>
  <button class="filter-chip" onclick="setFilter('상업시설', this)">상업시설</button>
  <button class="filter-chip" onclick="setFilter('공원', this)">공원</button>
  <button class="filter-chip" onclick="setFilter('지하철', this)">지하철</button>
  <button class="filter-chip" onclick="setFilter('쇼핑몰', this)">쇼핑몰</button>
  <button class="filter-chip" onclick="setFilter('기타', this)">기타</button>
</div>

<!-- MAP VIEW -->
<div id="map" style="flex:1; position:relative; display:flex; flex-direction:column;">
  <div id="map-canvas" style="flex:1;"></div>
  <div class="add-banner" id="add-banner">📍 지도를 탭해서 위치를 선택하세요</div>
  <div style="position:absolute;bottom:160px;right:16px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:3px;">
  <button class="fab-location" style="position:static;bottom:auto;right:auto;" onclick="goToMyLocation()" title="내 위치">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="8" fill="#d0e8ff" opacity="0.8"/>
      <circle cx="12" cy="12" r="5" fill="white" stroke="white" stroke-width="1"/>
      <circle cx="12" cy="12" r="3.5" fill="#1a73e8"/>
    </svg>
  </button>
  <span style="font-size:10px;font-weight:700;color:#444;background:white;padding:2px 6px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.2);white-space:nowrap;">내 위치</span>
</div>
</div>

<!-- LIST VIEW -->
<div class="list-view" id="list-view">
  <div class="list-search">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="화장실 이름 검색..." oninput="renderList(this.value)" id="search-input">
  </div>
  <div class="list-items" id="list-items"></div>
</div>

<!-- NAV -->
<nav>
  <button class="nav-btn active" id="nav-map" onclick="switchView('map')">
    <span class="nav-icon">🗺️</span>
    <span class="nav-label">지도</span>
  </button>
  <button class="nav-btn" id="nav-list" onclick="switchView('list')">
    <span class="nav-icon">📋</span>
    <span class="nav-label">목록</span>
  </button>
</nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<!-- DETAIL SHEET -->
<div class="bottom-sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content">
    <div class="detail-name" id="d-name"></div>
    <div class="detail-tags" id="d-tags"></div>
    <div class="stars" id="d-stars"></div>
    <div class="detail-notes" id="d-notes"></div>
    <div class="detail-meta" id="d-meta"></div>
    <div style="display:flex;gap:8px;margin-bottom:8px;"><button class="btn-nav" style="flex:1;margin-bottom:0;background:#FEE500;color:#3C1E1E;font-weight:900;" onclick="openKakaoNav()">🗺️ 카카오맵</button><button class="btn-nav" style="flex:1;margin-bottom:0;" onclick="openGoogleMapsNav()">🌐 구글맵</button></div>
    <button class="btn-delete" id="d-delete-btn" onclick="deleteSelected()" style="display:none;">삭제</button>
  </div>
</div>

<!-- ADD SHEET -->
<div class="bottom-sheet" id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content">
    <div class="sheet-title">🚻 새 화장실 등록</div>

    <div id="loc-indicator" class="location-indicator empty">
      📍 지도에서 위치를 먼저 탭하세요
    </div>

    <div class="form-group">
      <label class="form-label">이름 *</label>
      <input class="form-input" id="f-name" type="text" placeholder="예: 홍대입구역 공중화장실">
    </div>

    <div class="form-group">
      <label class="form-label">종류</label>
      <select class="form-select" id="f-type">
        <option>공공</option>
        <option>상업시설</option>
        <option>공원</option>
        <option>지하철</option>
        <option>쇼핑몰</option>
        <option>기타</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">청결도</label>
      <div class="rating-row" id="rating-row">
        <button class="star-btn on" onclick="setRating(1)">⭐</button>
        <button class="star-btn on" onclick="setRating(2)">⭐</button>
        <button class="star-btn on" onclick="setRating(3)">⭐</button>
        <button class="star-btn on" onclick="setRating(4)">⭐</button>
        <button class="star-btn" onclick="setRating(5)">⭐</button>
      </div>
    </div>

    <div class="form-group">
      <label class="check-row">
        <input type="checkbox" id="f-accessible">
        <span style="font-size:14px; font-weight:600;">♿ 장애인 접근 가능</span>
      </label>
    </div>

    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-input" id="f-notes" rows="2" placeholder="운영 시간, 위치 설명 등"></textarea>
    </div>

    <div class="error-msg" id="form-error"></div>

    <button class="btn-submit" onclick="submitToilet()">✓ 등록하기</button>
    <button class="btn-cancel" onclick="closeAllSheets()">취소</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────
const MAPS_API_KEY = "AIzaSyASSBx5OHwZIfhNIwLE0mlLS8bf0fwWZiI";

const ALL_SAMPLES = [...SAMPLES];

// ─── STORAGE ─────────────────────────────────────────
// 사용자 등록 화장실 캐시
let userToilets = [];
// 공공 화장실 캐시 (Geo 조회 결과)
let publicToilets = [];
// 마지막 Geo 조회 위치
let lastGeoCenter = null;

async function loadData() {
  try {
    document.getElementById('count-label').textContent = '데이터 로딩 중...';
    const { collection, getDocs } = window._fbFns;
    const db = window._db;

    // 사용자 등록 화장실만 전체 로드 (적은 양)
    const userSnap = await getDocs(collection(db, 'toilets'));
    userToilets = [];
    userSnap.forEach(d => userToilets.push({ ...d.data(), _docId: d.id }));

    toilets = [...ALL_SAMPLES, ...userToilets];
    updateCountLabel();
    renderMarkers();

    // 현재 지도 중심으로 근처 공공 화장실 로드
    const center = map.getCenter();
    await loadNearbyPublicToilets(center.lat(), center.lng());

  } catch(e) {
    console.error(e);
    toilets = ALL_SAMPLES;
    showToast('⚠️ 일부 데이터만 표시됩니다');
    updateCountLabel();
    renderMarkers();
  }
}

// 공공 화장실 Firebase 전체 로드 (geohash 준비 전 사용)
let publicDataLoaded = false;
async function loadNearbyPublicToilets(lat, lng) {
  // 이미 로드됐으면 스킵
  if (publicDataLoaded) return;
  await loadAllPublicToilets();
}

async function loadAllPublicToilets() {
  if (publicDataLoaded) return;
  try {
    const { collection, getDocs } = window._fbFns;
    const db = window._db;
    document.getElementById('count-label').textContent = '공공 화장실 로딩 중...';
    const snap = await getDocs(collection(db, 'public_toilets'));
    publicToilets = [];
    snap.forEach(d => publicToilets.push(d.data()));
    publicDataLoaded = true;
    toilets = [...ALL_SAMPLES, ...publicToilets, ...userToilets];
    showToast('✅ ' + toilets.length.toLocaleString() + '개 로드 완료!');
    updateCountLabel();
    renderMarkers();
  } catch(e) {
    console.error('공공 화장실 로드 오류:', e);
  }
}

// 경기도 공중화장실 API 호출 (CORS 우회: 프록시 사용)
async function loadGyeonggiData() {
  try {
    const pageSize = 1000;
    const apiUrl = `https://openapi.gg.go.kr/PublicToiletHc?KEY=${GG_API_KEY}&Type=json&pIndex=1&pSize=${pageSize}`;
    
    // 여러 CORS 프록시 순서대로 시도
    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`,
      `https://proxy.cors.sh/${apiUrl}`,
      `https://thingproxy.freeboard.io/fetch/${apiUrl}`,
    ];
    
    let data = null;
    for (const proxyUrl of proxies) {
      try {
        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) continue;
        data = await res.json();
        if (data?.PublicToiletHc) break;
      } catch(e) {
        continue;
      }
    }
    
    if (!data?.PublicToiletHc) {
      console.warn('경기도 API: 모든 프록시 실패');
      return [];
    }
    
    const rows = data.PublicToiletHc[1]?.row || [];
    const results = [];
    
    rows.forEach((r, i) => {
      const lat = parseFloat(r.REFINE_WGS84_LAT);
      const lng = parseFloat(r.REFINE_WGS84_LOGT);
      if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;
      if (!(33 < lat && lat < 39 && 124 < lng && lng < 132)) return;
      
      results.push({
        id: `gg_${i}_${Date.now()}`,
        name: r.PBCTLT_PLC_NM || '경기도 공중화장실',
        lat, lng,
        type: '공공',
        rating: 4,
        accessible: (parseInt(r.MALE_HANDICAPPED_TOILET_CNT) > 0 || parseInt(r.FEMALE_HANDICAPPED_TOILET_CNT) > 0),
        notes: `${r.SIGUN_NM || ''} | ${r.REFINE_ROADNM_ADDR || r.REFINE_LOTNO_ADDR || ''}`.trim(),
        addedBy: '경기도공공데이터',
        ts: 1700000000000
      });
    });
    
    console.log(`경기도 API: ${results.length}개 로드 완료`);
    return results;
  } catch(e) {
    console.warn('경기도 API 오류:', e);
    return [];
  }
}

async function saveData(toilet) {
  try {
    const { collection, addDoc } = window._fbFns;
    const db = window._db;
    const docRef = await addDoc(collection(db, 'toilets'), toilet);
    return docRef.id;
  } catch(e) {
    console.error('Firebase 저장 오류:', e);
    return null;
  }
}

async function deleteFromFirebase(docId) {
  try {
    const { doc, deleteDoc } = window._fbFns;
    const db = window._db;
    await deleteDoc(doc(db, 'toilets', docId));
  } catch(e) { console.error(e); }
}

// ─── MAP INIT ────────────────────────────────────────
function initMap() {
  map = new google.maps.Map(document.getElementById('map-canvas'), {
    center: { lat: 37.5665, lng: 126.9780 },
    zoom: 14,
    disableDefaultUI: true,
    zoomControl: true,
    gestureHandling: 'greedy',
    styles: [
      { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
      { featureType: "transit.station", elementType: "labels.icon", stylers: [{ visibility: "simplified" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9e8f5" }] },
      { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#f5f7f2" }] },
      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
      { featureType: "road.arterial", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
      { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#888888" }] },
    ]
  });

  map.addListener('click', function(e) {
    if (addMode) {
      setPendingLocation(e.latLng.lat(), e.latLng.lng());
    } else {
      closeAllSheets();
    }
  });

  // 지도 이동/줌 완료 후 마커 갱신 + 근처 데이터 재조회
  map.addListener('idle', function() {
    renderMarkers();
    // 공공 데이터 아직 안 로드됐으면 로드
    if (window._db && !publicDataLoaded) {
      const center = map.getCenter();
      loadNearbyPublicToilets(center.lat(), center.lng());
    }
  });

  if (window._db) {
    loadData();
  } else {
    window.addEventListener('firebase-ready', () => {
      loadData();
    });
  }
}

// ─── MARKERS ─────────────────────────────────────────
let renderTimer = null;
function renderMarkers() {
  // 디바운스: 연속 호출 방지
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(_doRenderMarkers, 200);
}

function _doRenderMarkers() {
  // 현재 뷰포트 범위 계산
  const bounds = map.getBounds();
  if (!bounds) return;

  const filtered = toilets.filter(t => activeFilter === '전체' || t.type === activeFilter);

  // 뷰포트 밖 마커 제거, 안에 있는 것만 추가 (최대 200개)
  const inView = filtered.filter(t => bounds.contains({ lat: t.lat, lng: t.lng }));
  const toShow = inView.slice(0, 200);
  const toShowIds = new Set(toShow.map(t => t.id));

  // 뷰포트 밖 마커 제거
  Object.keys(markers).forEach(id => {
    if (!toShowIds.has(id)) {
      markers[id].setMap(null);
      delete markers[id];
    }
  });

  // 새 마커 추가
  toShow.forEach(t => {
    if (markers[t.id]) return; // 이미 있으면 스킵
    const color = t.accessible ? '#00c896' : '#ff7043';
    const marker = new google.maps.Marker({
      position: { lat: t.lat, lng: t.lng },
      map,
      title: t.name,
      icon: {
        path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z',
        fillColor: color,
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        scale: 1.6,
        anchor: new google.maps.Point(12, 22),
        labelOrigin: new google.maps.Point(12, 9),
      },
      label: { text: '🚻', fontSize: '11px' },
    });
    marker.addListener('click', () => openDetail(t.id));
    markers[t.id] = marker;
  });

  updateCountLabel();
}

function openAddSheet() {
  addMode = true;
  pendingLatLng = null;
  document.getElementById('add-banner').classList.add('show');
  document.getElementById('loc-indicator').className = 'location-indicator empty';
  document.getElementById('loc-indicator').textContent = '📍 지도에서 위치를 먼저 탭하세요';

  document.getElementById('f-accessible').checked = false;

}

function setPendingLocation(lat, lng) {
  pendingLatLng = { lat, lng };
  if (pendingMarker) pendingMarker.setMap(null);
  pendingMarker = new google.maps.Marker({
    position: { lat, lng },

function closeSheet(id) {
  document.getElementById(id).classList.remove('open');
  const anyOpen = document.querySelector('.bottom-sheet.open');
  if (!anyOpen) document.getElementById('overlay').classList.remove('show');
}

function submitToilet() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('form-error').textContent = '⚠ 이름을 입력하세요'; return; }
  if (!pendingLatLng) { document.getElementById('form-error').textContent = '⚠ 지도를 탭해서 위치를 선택하세요'; return; }

  const t = {
    id: 'u' + Date.now(),
    name,
    lat: pendingLatLng.lat,
    lng: pendingLatLng.lng,
    type: document.getElementById('f-type').value,
    rating: formRating,
    accessible: document.getElementById('f-accessible').checked,
    notes: document.getElementById('f-notes').value.trim(),
    addedBy: '사용자',
    ts: Date.now(),
  };

  saveData(t).then(docId => {
    if (docId) t._docId = docId;
    toilets.unshift(t);
    renderMarkers();
    showToast('✅ 화장실이 등록되었습니다!');
    map.panTo({ lat: t.lat, lng: t.lng });
  });

  if (pendingMarker) { pendingMarker.setMap(null); pendingMarker = null; }
  addMode = false;
  document.getElementById('add-banner').classList.remove('show');
  pendingLatLng = null;
  closeAllSheets();
}

// ─── DETAIL ──────────────────────────────────────────
function openDetail(id) {
  const t = toilets.find(x => x.id === id);
  if (!t) return;
  selectedId = id;

  document.getElementById('d-name').textContent = t.name;
  document.getElementById('d-stars').textContent = '★'.repeat(t.rating) + '☆'.repeat(5 - t.rating);
  document.getElementById('d-notes').textContent = t.notes || '메모 없음';
  document.getElementById('d-meta').textContent = `${t.addedBy} · ${timeAgo(t.ts)}`;

  const tags = document.getElementById('d-tags');
  tags.innerHTML = `<span class="tag tag-type">${t.type}</span>` +
    (t.accessible ? '<span class="tag tag-accessible">♿ 접근 가능</span>' : '') +
    (t.addedBy === '경기도공공데이터' ? '<span class="tag tag-api">📡 API</span>' : '');

  document.getElementById('d-delete-btn').style.display = t.id.startsWith('s') ? 'none' : 'block';

  if (markers[id]) {
    markers[id].setAnimation(google.maps.Animation.BOUNCE);
    setTimeout(() => markers[id] && markers[id].setAnimation(null), 800);
  }
  map.panTo({ lat: t.lat, lng: t.lng });
  openSheet('detail-sheet');
}

// ─── FILTER ──────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMarkers();
  renderList(document.getElementById('search-input').value);
}

// ─── LIST ────────────────────────────────────────────
function renderList(search = '') {
  let filtered = toilets
    .filter(t => activeFilter === '전체' || t.type === activeFilter)
    .filter(t => !search || t.name.includes(search) || (t.notes && t.notes.includes(search)));

  // 지도 뷰포트 범위 안의 화장실만 표시 (검색어 없을 때)
  const bounds = map && map.getBounds();
  let isViewportFiltered = false;
  if (bounds && !search) {
    const inView = filtered.filter(t => bounds.contains({ lat: t.lat, lng: t.lng }));
    if (inView.length > 0) {
      filtered = inView;
      isViewportFiltered = true;
    }
  }

  // 내 위치 있으면 거리 계산 후 가까운 순 정렬
  if (userLocation) {
    filtered = filtered.map(t => ({
      ...t,
      distance: calcDistance(userLocation.lat, userLocation.lng, t.lat, t.lng)
    })).sort((a, b) => a.distance - b.distance);
  }

  const container = document.getElementById('list-items');
  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🚻</div><p>이 지역에 등록된 화장실이 없습니다</p></div>`;
    return;
  }

  const viewportBadge = isViewportFiltered
    ? `<div style="text-align:center;padding:8px;font-size:12px;color:#00c896;background:#f0fdf8;border-radius:10px;margin-bottom:10px;font-weight:700;">🗺️ 현재 지도 화면의 화장실 ${filtered.length}개</div>`
    : '';
  const locationHint = userLocation ? '' : `<div style="text-align:center;padding:10px;font-size:12px;color:#aaa;background:#f9f9f9;border-radius:10px;margin-bottom:10px;">📍 지도 화면에서 위치 버튼을 누르면 가까운 순으로 정렬돼요</div>`;
  const headerHtml = viewportBadge + (isViewportFiltered ? '' : locationHint);

  container.innerHTML = headerHtml + filtered.map(t => `
    <div class="list-card" onclick="openDetailFromList('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="list-card-name" style="flex:1;">${t.name}</div>
        ${t.distance !== undefined ? `<span style="font-size:13px;font-weight:800;color:var(--teal-dark);margin-left:8px;white-space:nowrap;">${formatDistance(t.distance)}</span>` : ''}
      </div>
      <div class="detail-tags" style="margin-bottom:6px">
        <span class="tag tag-type">${t.type}</span>
        ${t.accessible ? '<span class="tag tag-accessible">♿</span>' : ''}
        ${t.addedBy === '경기도공공데이터' ? '<span class="tag tag-api">API</span>' : ''}
      </div>
      <div class="list-card-row">
        <span class="list-card-stars">${'★'.repeat(t.rating)}${'☆'.repeat(5-t.rating)}</span>
        <span class="list-card-time">${timeAgo(t.ts)}</span>
      </div>
      ${t.notes ? `<div class="list-card-notes">${t.notes}</div>` : ''}
    </div>
  `).join('');
}

function openDetailFromList(id) {
  switchView('map');
  setTimeout(() => openDetail(id), 300);
}

// ─── LOCATION ────────────────────────────────────────
function goToMyLocation() {
  if (!navigator.geolocation) { showToast('위치 정보를 사용할 수 없습니다'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    map.panTo(userLocation);
    map.setZoom(16);
    // 기존 내 위치 마커 제거
    if (window._myLocationMarker) window._myLocationMarker.setMap(null);
    if (window._myLocationOverlay) window._myLocationOverlay.setMap(null);

    // 구글맵 스타일 내 위치 마커 (파란점 + 흰 테두리 + 후광)
    const myLocDiv = document.createElement('div');
    myLocDiv.style.cssText = 'width:24px;height:24px;position:relative;cursor:default;';
    myLocDiv.innerHTML = `
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
        width:24px;height:24px;border-radius:50%;
        background:rgba(66,133,244,0.2);animation:pulse 2s infinite;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
        width:16px;height:16px;border-radius:50%;background:white;
        box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
        width:11px;height:11px;border-radius:50%;background:#4285f4;"></div>
    `;

    class MyLocationOverlay extends google.maps.OverlayView {
      constructor(pos, div) { super(); this.pos = pos; this.div = div; }
      onAdd() { this.getPanes().floatPane.appendChild(this.div); }
      draw() {
        const proj = this.getProjection();
        const pt = proj.fromLatLngToDivPixel(this.pos);
        this.div.style.left = (pt.x - 12) + 'px';
        this.div.style.top = (pt.y - 12) + 'px';
        this.div.style.position = 'absolute';
      }
      onRemove() { if (this.div.parentNode) this.div.parentNode.removeChild(this.div); }
    }

    if (!document.getElementById('my-loc-pulse-style')) {
      const style = document.createElement('style');
      style.id = 'my-loc-pulse-style';
      style.textContent = '@keyframes pulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6} 50%{transform:translate(-50%,-50%) scale(1.6);opacity:0.2} }';
      document.head.appendChild(style);
    }

    window._myLocationOverlay = new MyLocationOverlay(new google.maps.LatLng(userLocation.lat, userLocation.lng), myLocDiv);
    window._myLocationOverlay.setMap(map);
    renderList(document.getElementById('search-input').value);
    showToast('📍 내 위치 기준으로 정렬됩니다');
  }, () => showToast('위치 접근 권한이 필요합니다'));
}

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDistance(m) {
  if (m < 1000) return Math.round(m) + 'm';
  return (m / 1000).toFixed(1) + 'km';
}

// ─── UI HELPERS ──────────────────────────────────────
function openSheet(id) {

  document.getElementById('overlay').classList.add('show');
}

function closeAllSheets() {
  document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('open'));
  document.getElementById('overlay').classList.remove('show');
  if (addMode) {
    addMode = false;
    document.getElementById('add-banner').classList.remove('show');
    if (pendingMarker) { pendingMarker.setMap(null); pendingMarker = null; }
  }
}

function switchView(v) {
  const mapEl = document.getElementById('map');
  const listEl = document.getElementById('list-view');
  document.getElementById('nav-map').classList.toggle('active', v === 'map');
  document.getElementById('nav-list').classList.toggle('active', v === 'list');
  if (v === 'map') {
    mapEl.style.display = 'flex';
    listEl.classList.remove('show');
  } else {
    mapEl.style.display = 'none';
    listEl.classList.add('show');
    // 약간 딜레이 후 렌더 (지도 bounds가 준비된 후)
    setTimeout(() => renderList(document.getElementById('search-input').value), 100);
  }
}

function setRating(n) {
  formRating = n;
  updateStars();
}

function updateStars() {
  document.querySelectorAll('.star-btn').forEach((b, i) => {
    b.classList.toggle('on', i < formRating);
  });
}

function updateCountLabel() {
  const filtered = toilets.filter(t => activeFilter === '전체' || t.type === activeFilter);
  document.getElementById('count-label').textContent = `${filtered.length}개 등록됨 · 공유 데이터`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 3600000) return `${Math.floor(d/60000)}분 전`;
  if (d < 86400000) return `${Math.floor(d/3600000)}시간 전`;
  return `${Math.floor(d/86400000)}일 전`;
}

<!-- Geohash 라이브러리 -->
<script>
// Geohash 인코딩/디코딩 (경량 구현)
const BASE32 = '0123456789bcdefghjkmnpqrstuvwxyz';
function encodeGeohash(lat, lng, precision = 6) {
  let minLat = -90, maxLat = 90, minLng = -180, maxLng = 180;
  let hash = '', bits = 0, evenBit = true, bitCount = 0;
  while (hash.length < precision) {
    if (evenBit) {
      const mid = (minLng + maxLng) / 2;
      if (lng >= mid) { bits = (bits << 1) | 1; minLng = mid; }
      else { bits = bits << 1; maxLng = mid; }
    } else {
      const mid = (minLat + maxLat) / 2;
      if (lat >= mid) { bits = (bits << 1) | 1; minLat = mid; }
      else { bits = bits << 1; maxLat = mid; }
    }
    evenBit = !evenBit;
    if (++bitCount === 5) {
      hash += BASE32[bits]; bits = 0; bitCount = 0;
    }
  }
  return hash;
}
function getGeohashRange(lat, lng, radiusKm) {
  const latDelta = radiusKm / 111;
  const lngDelta = radiusKm / (111 * Math.cos(lat * Math.PI / 180));
  const minHash = encodeGeohash(lat - latDelta, lng - lngDelta, 4);
  const maxHash = encodeGeohash(lat + latDelta, lng + lngDelta, 4);
  return { minHash, maxHash };
}
window._geohash = { encode: encodeGeohash, getRange: getGeohashRange };
</script>
