<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>화장실 데이터 업로드</title>
<style>
  body { font-family: 'Noto Sans KR', sans-serif; padding: 30px; background: #f0f4f8; }
  .box { background: white; padding: 28px; border-radius: 16px; max-width: 520px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h2 { color: #00c896; margin-bottom: 8px; }
  .progress { height: 24px; background: #eee; border-radius: 12px; margin: 16px 0; overflow: hidden; }
  .bar { height: 100%; background: linear-gradient(90deg, #00c896, #009e76); width: 0%; transition: width 0.3s; border-radius: 12px; }
  .status { font-size: 14px; color: #555; margin: 8px 0; min-height: 20px; }
  button { background: #00c896; color: white; border: none; padding: 14px 28px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 12px; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .warn { color: #e74c3c; font-size: 13px; background: #fff5f5; padding: 10px 14px; border-radius: 8px; margin: 12px 0; }
</style>
</head>
<body>
<div class="box">
  <h2>🚻 화장실 데이터 업로드</h2>
  <p>전국 공중화장실 + 서울 지하철 화장실 데이터를 Firebase에 업로드합니다.</p>
  <div class="warn">⚠️ 이 페이지는 <strong>1회만</strong> 실행하세요!</div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">업로드 시작 버튼을 누르세요</div>
  <button id="btn" onclick="startUpload()">🚀 업로드 시작</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, writeBatch, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD-wCqbaDy-MgDn2tK8zIxJR6kYcPehYcw",
  authDomain: "toilet-finder-d4233.firebaseapp.com",
  projectId: "toilet-finder-d4233",
  storageBucket: "toilet-finder-d4233.firebasestorage.app",
  messagingSenderId: "630778274308",
  appId: "1:630778274308:web:3fe98d6393628c8a450b51"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const sleep = ms => new Promise(r => setTimeout(r, ms));

window.startUpload = async function() {
  const btn = document.getElementById('btn');
  const bar = document.getElementById('bar');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '📥 데이터 파일 불러오는 중...';

  try {
    const res = await fetch('./toilet-data.json');
    const ALL_DATA = await res.json();
    const total = ALL_DATA.length;
    status.textContent = `총 ${total.toLocaleString()}개 로드 완료. 업로드 시작...`;

    const BATCH_SIZE = 200; // 배치 크기 줄임
    const DELAY = 500; // 배치 사이 0.5초 대기
    let uploaded = 0;

    for (let i = 0; i < total; i += BATCH_SIZE) {
      const batch = writeBatch(db);
      const chunk = ALL_DATA.slice(i, i + BATCH_SIZE);
      chunk.forEach(t => {
        const ref = doc(collection(db, 'public_toilets'));
        batch.set(ref, t);
      });

      // 재시도 로직
      let retries = 3;
      while (retries > 0) {
        try {
          await batch.commit();
          break;
        } catch(e) {
          retries--;
          if (retries === 0) throw e;
          status.textContent = `⏳ 잠시 대기 중... (재시도 ${3-retries}/3)`;
          await sleep(2000);
        }
      }

      uploaded += chunk.length;
      const pct = Math.round(uploaded / total * 100);
      bar.style.width = pct + '%';
      status.textContent = `${uploaded.toLocaleString()} / ${total.toLocaleString()}개 완료 (${pct}%)`;

      await sleep(DELAY); // 배치 사이 딜레이
    }

    status.textContent = '✅ 모든 데이터 업로드 완료!';
    status.style.color = '#00c896';
    status.style.fontWeight = '700';
    btn.textContent = '✅ 완료';
  } catch(e) {
    status.textContent = '❌ 오류: ' + e.message;
    status.style.color = 'red';
    btn.disabled = false;
    btn.textContent = '🔄 다시 시도';
  }
};
</script>
</body>
</html>
